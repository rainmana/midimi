name: ci

# Fast quality gate on every push/PR to main: type-check the frontend, run the
# Rust test suite (incl. the real offline-render test), and build the frontend.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Needed by the audio offline-render test (reads the bundled .sf2).
      - name: Fetch bundled soundfont
        run: bash scripts/fetch-soundfont.sh

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: npm run build
